<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>내 정보 프리뷰</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f3f4f6; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .phone { max-width: 390px; margin: 0 auto; background: #f3f4f6; min-height: 100vh; }
  </style>
</head>
<body>
<div class="phone px-0 py-0">

  <!-- 상단 헤더 -->
  <header class="px-4 pt-6 pb-2">
    <h1 class="text-2xl font-bold text-gray-900">내 정보</h1>
  </header>

  <!-- ── 디자인 A: 아바타 + 우측 정보 ── -->
  <div class="px-4 mb-3">
    <p class="text-[11px] text-gray-500 mb-1 pl-1">디자인 A — 아바타 + 우측 정보</p>
    <div class="bg-white rounded-2xl p-4 flex items-center gap-4">
      <!-- 아바타 -->
      <div class="shrink-0 w-14 h-14 rounded-full bg-green-100 flex items-center justify-center text-2xl font-bold text-green-700">
        시
      </div>
      <!-- 텍스트 -->
      <div class="flex-1 min-w-0">
        <p class="text-base font-bold text-gray-900 truncate">시너지</p>
        <p class="text-xs text-gray-600 truncate mt-0.5">sinergy1@naver.com</p>
        <!-- 뱃지 -->
        <span class="inline-flex items-center gap-1 mt-1.5 px-2 py-0.5 rounded-full text-[11px] font-semibold bg-green-50 text-green-800">
          <svg width="13" height="13" viewBox="0 0 20 20" fill="none">
            <rect width="20" height="20" rx="5" fill="#03C75A"/>
            <path d="M11.386 10.22L8.46 5.5H5.5v9h3.114V9.78L11.54 14.5H14.5V5.5h-3.114v4.72z" fill="white"/>
          </svg>
          네이버 로그인
        </span>
      </div>
    </div>
  </div>

  <!-- ── 디자인 B: 가로 3칸 그리드 ── -->
  <div class="px-4 mb-3">
    <p class="text-[11px] text-gray-500 mb-1 pl-1">디자인 B — 가로 3칸 그리드</p>
    <div class="bg-white rounded-2xl p-4">
      <div class="flex items-center divide-x divide-gray-100">
        <div class="flex-1 pr-3 text-center">
          <p class="text-[10px] text-gray-500 mb-1">로그인</p>
          <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded-full text-[10px] font-semibold bg-green-50 text-green-800">
            <svg width="12" height="12" viewBox="0 0 20 20" fill="none">
              <rect width="20" height="20" rx="5" fill="#03C75A"/>
              <path d="M11.386 10.22L8.46 5.5H5.5v9h3.114V9.78L11.54 14.5H14.5V5.5h-3.114v4.72z" fill="white"/>
            </svg>
            네이버
          </span>
        </div>
        <div class="flex-1 px-3 text-center">
          <p class="text-[10px] text-gray-500 mb-1">닉네임</p>
          <p class="text-sm font-bold text-gray-900">시너지</p>
        </div>
        <div class="flex-1 pl-3 text-center">
          <p class="text-[10px] text-gray-500 mb-1">이메일</p>
          <p class="text-[11px] text-gray-700 break-all leading-tight">sinergy1@naver.com</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 디자인 C: 아이콘 원형 + 인라인 정보 2줄 ── -->
  <div class="px-4 mb-3">
    <p class="text-[11px] text-gray-500 mb-1 pl-1">디자인 C — 로고 원형 + 2줄 정보</p>
    <div class="bg-white rounded-2xl p-4 flex items-center gap-3">
      <!-- 로고 원형 -->
      <div class="shrink-0 w-12 h-12 rounded-full bg-green-500 flex items-center justify-center shadow-sm">
        <svg width="22" height="22" viewBox="0 0 20 20" fill="none">
          <path d="M11.386 10.22L8.46 5.5H5.5v9h3.114V9.78L11.54 14.5H14.5V5.5h-3.114v4.72z" fill="white"/>
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2">
          <p class="text-base font-bold text-gray-900">시너지</p>
          <span class="text-[10px] text-green-700 font-semibold bg-green-50 px-1.5 py-0.5 rounded-full">네이버</span>
        </div>
        <p class="text-xs text-gray-600 mt-0.5 truncate">sinergy1@naver.com</p>
      </div>
    </div>
  </div>

  <!-- ── 디자인 D: 미니멀 한 줄 배너 ── -->
  <div class="px-4 mb-6">
    <p class="text-[11px] text-gray-500 mb-1 pl-1">디자인 D — 미니멀 한 줄</p>
    <div class="bg-white rounded-2xl px-4 py-3 flex items-center gap-3">
      <span class="shrink-0 inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-green-50 text-green-800">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
          <rect width="20" height="20" rx="5" fill="#03C75A"/>
          <path d="M11.386 10.22L8.46 5.5H5.5v9h3.114V9.78L11.54 14.5H14.5V5.5h-3.114v4.72z" fill="white"/>
        </svg>
        네이버
      </span>
      <span class="text-sm font-bold text-gray-900">시너지</span>
      <span class="text-gray-300 text-xs">·</span>
      <span class="text-xs text-gray-600 truncate flex-1">sinergy1@naver.com</span>
    </div>
  </div>

  <!-- 나머지 섹션 (참고용) -->
  <section class="px-4">
    <h2 class="text-base font-bold text-gray-900 mb-2">알림 설정</h2>
    <div class="bg-white rounded-2xl overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3.5">
        <div>
          <p class="text-sm font-semibold text-gray-900">전체 알림</p>
          <p class="text-xs text-gray-600 mt-0.5">꺼짐 시 모든 알림이 오지 않습니다</p>
        </div>
        <div class="w-12 h-7 rounded-full bg-gray-900 flex items-center">
          <span class="block w-5 h-5 bg-white rounded-full shadow ml-6"></span>
        </div>
      </div>
    </div>
  </section>

</div>
</body>
</html>
